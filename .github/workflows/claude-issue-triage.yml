name: Claude Issue Triage

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Issue Triage
        id: claude-triage
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Necesita leer archivos del repo (CLAUDE.md, game.js, etc.) además de
          # gestionar labels y comentar en el issue
          claude_args: '--allowed-tools "Read,Glob,Grep,Bash(gh issue *),Bash(gh label *)"'

          # DEBUG temporal: muestra la salida completa para diagnosticar por qué
          # no se aplicaron labels ni se publicó el diagnóstico. Revertir tras el diagnóstico.
          show_full_output: true

          prompt: |
            Estás analizando el issue #${{ github.event.issue.number }} del repositorio
            ${{ github.repository }} (un juego de Tetris en HTML/CSS/JS puro: `index.html`,
            `style.css`, `game.js`; ver `CLAUDE.md` para la arquitectura completa).

            Tu tarea, en ESPAÑOL, es hacer triage del issue:

            1. Lee el título y el cuerpo del issue con `gh issue view ${{ github.event.issue.number }}`.

            2. Determina las labels apropiadas de este conjunto base:
               `bug`, `enhancement`, `question`, `documentation`, `gameplay`, `ui`,
               `performance`, `good first issue`. Puedes aplicar más de una si corresponde.
               - Antes de aplicar una label, comprueba si ya existe en el repo con
                 `gh label list`. Si no existe, créala con `gh label create <nombre> --color <hex> --description "<desc>"`
                 usando colores/descripciones razonables.
               - Aplica las labels elegidas con
                 `gh issue edit ${{ github.event.issue.number }} --add-label "<label1>,<label2>"`.
               - No elimines labels existentes que no estén relacionadas con tu análisis.

            3. Publica UN comentario en el issue con un diagnóstico general, en español,
               que sirva como base para implementar la solución más adelante. El comentario
               DEBE empezar con la línea exacta `<!-- claude-triage -->` (oculta en el render)
               seguida de:
               - **Resumen del problema**: qué está pasando, en 1-3 frases.
               - **Área del código afectada**: qué archivo(s) y función(es) de
                 `game.js` / `index.html` / `style.css` probablemente están involucrados
                 (usa lo que sabes de la arquitectura del proyecto).
               - **Causa probable**: hipótesis técnica concreta.
               - **Próximos pasos sugeridos**: lista breve de pasos para implementar la solución.

            4. IMPORTANTE — idempotencia: antes de comentar, lista los comentarios existentes
               con `gh issue view ${{ github.event.issue.number }} --json comments` y busca uno
               que empiece con `<!-- claude-triage -->`.
               - Si NO existe, crea el comentario nuevo con `gh issue comment ${{ github.event.issue.number }} --body-file <archivo>`.
               - Si YA existe (por ejemplo porque el issue fue editado), actualiza ESE mismo
                 comentario con `gh issue comment ${{ github.event.issue.number }} --edit-last --body-file <archivo>`
                 solo si tu comentario anterior fue el último; si no es el último comentario,
                 usa `gh api` para editarlo por su id en lugar de crear uno nuevo. Nunca dejes
                 dos comentarios de diagnóstico.
